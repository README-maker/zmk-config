name: Build ZMK Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Cache west modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: |
            ./zephyr
            ./modules
            ./tools
          key: west-${{ hashFiles('config/west.yml') }}
          restore-keys: |
            west-

      - name: West init
        run: west init -l config

      - name: West update
        run: west update --narrow --fetch-depth=1

      - name: West Zephyr export
        run: west zephyr-export

      - name: Build firmware
        run: |
          for shield in zmk_cradio_left zmk_cradio_right settings_reset; do
            west build -b nice_nano -d build/$shield -- -DSHIELD=$shield -DCONFIG_ZMK_BOARD_COMPAT=y
            west build -t clean -d build/$shield
          done

      - name: Archive artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: build/**/zephyr/zmk.*.uf2
